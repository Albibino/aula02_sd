name: Pipeline

on:
    push:
        branches: ["main"]

jobs:
    lint: 
        name: lint
        runs-on: ubuntu-latest

        steps:
            - name: clonar
              uses: actions/checkout@v4

            - name: config python
              uses: actions/setup-python@v5
              with:
                python-version: "3.11"

            - name: instalar deps
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: flake8
              run: |
                flake8 app tests --max-line-lenght=88
    
    test:
        name: testes
        runs-on: ubuntu-latest
        needs: lint

        steps:
            - name: clonar rep
              uses: actions/checkout@v4
            
            - name: config python2
              uses: actions/setup-python@v5
              with:
                python-version: "3.11"

            - name: instalar deps2
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt

            - name: rodar testes
              run: |
                pytest tests 

    build:
        name: build
        runs-on: ubuntu-latest
        needs: test

        steps:
            - name: clonar rep2
              uses: actions/checkout@v4

            - name: gerar artefato
              run: |
                mkdir dist
                cp -r app dist/
                cp requirements.txt dist/
                echo "Build pronta" > dist/build-info.txt

            - name: publicar
              uses: actions/upload-artifact@v4
              with:
                name: pacote-aplicacao
                path: dist/